spring.application.name=fantasybackend
app.brand.name=${APP_BRAND_NAME:Community Fantasy League}

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

spring.jackson.datatype.datetime.write-dates-as-timestamps=false
spring.jackson.time-zone=${APP_TIME_ZONE:Asia/Kolkata}

jwt.secret=${JWT_SECRET:}
jwt.access-token-expiry-minutes=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:60}
jwt.refresh-token-expiry-days=${JWT_REFRESH_TOKEN_EXPIRY_DAYS:30}

sportmonks.cricket-base-url=${SPORTMONKS_CRICKET_BASE_URL:https://cricket.sportmonks.com/api/v2.0}
sportmonks.token=${SPORTMONKS_TOKEN:}
sportmonks.cricket-league-ids=${SPORTMONKS_CRICKET_LEAGUE_IDS:all}
sportmonks.default-league-id=${SPORTMONKS_DEFAULT_LEAGUE_ID:${SPORTMONKS_IPL_LEAGUE_ID:1}}
sportmonks.upcoming-sync-days=${SPORTMONKS_UPCOMING_SYNC_DAYS:120}
sportmonks.upcoming-sync-stale-minutes=${SPORTMONKS_UPCOMING_SYNC_STALE_MINUTES:30}
sportmonks.upcoming-missing-league-refresh-minutes=${SPORTMONKS_UPCOMING_MISSING_LEAGUE_REFRESH_MINUTES:5}
fantasy.upcoming-days=${FANTASY_UPCOMING_DAYS:120}

app.cricket-sport-id=${APP_CRICKET_SPORT_ID:1}

logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}

app.otp.fixed-enabled=${APP_OTP_FIXED_ENABLED:false}
app.otp.fixed-value=${APP_OTP_FIXED_VALUE:}
app.otp.expiry-minutes=${APP_OTP_EXPIRY_MINUTES:5}
app.otp.expose-in-response=${APP_OTP_EXPOSE_IN_RESPONSE:false}

app.team.max-players=${APP_TEAM_MAX_PLAYERS:11}
app.team.max-from-one-side=${APP_TEAM_MAX_FROM_ONE_SIDE:7}
app.team.credit-limit=${APP_TEAM_CREDIT_LIMIT:100.0}
app.team.default-player-credit=${APP_TEAM_DEFAULT_PLAYER_CREDIT:8.0}
app.player-pool.auto-refresh-window-minutes=${APP_PLAYER_POOL_AUTO_REFRESH_WINDOW_MINUTES:180}
app.player-pool.stale-refresh-min-seconds=${APP_PLAYER_POOL_STALE_REFRESH_MIN_SECONDS:120}
app.player-pool.announced-stale-refresh-min-seconds=${APP_PLAYER_POOL_ANNOUNCED_STALE_REFRESH_MIN_SECONDS:45}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app.admin.seed-default.enabled=${APP_ADMIN_SEED_DEFAULT_ENABLED:false}
app.admin.seed-default.username=${APP_ADMIN_SEED_DEFAULT_USERNAME:}
app.admin.seed-default.password=${APP_ADMIN_SEED_DEFAULT_PASSWORD:}
app.admin.seed-default.secondary-username=${APP_ADMIN_SEED_DEFAULT_SECONDARY_USERNAME:}
app.admin.seed-default.secondary-password=${APP_ADMIN_SEED_DEFAULT_SECONDARY_PASSWORD:}

fantasy.fixtures.sync-on-read=${FANTASY_FIXTURES_SYNC_ON_READ:false}
fantasy.fixtures.background-sync-enabled=${FANTASY_FIXTURES_BACKGROUND_SYNC_ENABLED:true}
fantasy.fixtures.background-sync-initial-delay-ms=${FANTASY_FIXTURES_BACKGROUND_SYNC_INITIAL_DELAY_MS:30000}
fantasy.fixtures.background-sync-fixed-delay-ms=${FANTASY_FIXTURES_BACKGROUND_SYNC_FIXED_DELAY_MS:900000}

fantasy.community-contests.background-sync-enabled=${FANTASY_COMMUNITY_CONTESTS_BACKGROUND_SYNC_ENABLED:true}
fantasy.community-contests.background-sync-initial-delay-ms=${FANTASY_COMMUNITY_CONTESTS_BACKGROUND_SYNC_INITIAL_DELAY_MS:45000}
fantasy.community-contests.background-sync-fixed-delay-ms=${FANTASY_COMMUNITY_CONTESTS_BACKGROUND_SYNC_FIXED_DELAY_MS:60000}

fantasy.live-scoring.background-sync-enabled=${FANTASY_LIVE_SCORING_BACKGROUND_SYNC_ENABLED:true}
fantasy.live-scoring.background-sync-initial-delay-ms=${FANTASY_LIVE_SCORING_BACKGROUND_SYNC_INITIAL_DELAY_MS:45000}
fantasy.live-scoring.background-sync-fixed-delay-ms=${FANTASY_LIVE_SCORING_BACKGROUND_SYNC_FIXED_DELAY_MS:30000}

app.push.enabled=${APP_PUSH_ENABLED:true}
app.push.firebase-service-account-path=${APP_PUSH_FIREBASE_SERVICE_ACCOUNT_PATH:}
app.push.android-channel-id=${APP_PUSH_ANDROID_CHANNEL_ID:fantasy_general_notifications}
