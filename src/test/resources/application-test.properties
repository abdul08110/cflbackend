spring.datasource.url=jdbc:h2:mem:fantasydb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=test-secret-key-that-is-at-least-32-bytes-long
sportmonks.token=test-token

app.mail.from=test@example.com
app.otp.fixed-enabled=false
app.admin.seed-default.enabled=false
app.cors.allowed-origin-patterns=http://localhost:*

fantasy.fixtures.sync-on-read=false
fantasy.fixtures.background-sync-enabled=false
